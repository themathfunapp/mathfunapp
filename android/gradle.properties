org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError -Dhttps.protocols=TLSv1.2,TLSv1.3
org.gradle.daemon=false
org.gradle.parallel=false

android.useAndroidX=true
android.enableJetifier=true

# Daha agresif R8 küçültme / şaşırtma (nadiren ek ProGuard kuralı gerekebilir)
android.enableR8.fullMode=true
