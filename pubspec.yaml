name: mathfun
description: "Matematik Macerası - Çocuklar için Matematik Öğrenme Oyunu"
publish_to: 'none'
version: 1.0.3+4

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  animations: ^2.1.1
  confetti: ^0.7.0
  audioplayers: ^6.0.0

  # Firebase
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  cloud_functions: ^6.0.7
  firebase_messaging: ^16.0.0
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.0
  flutter_timezone: ^4.1.0

  # Auth
  google_sign_in: ^6.1.6
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.3

  # State management
  provider: ^6.1.2
  flutter_slidable: ^3.1.2

  shared_preferences: ^2.2.2

  # In-App Purchase
  in_app_purchase: ^3.2.0

  # AdMob
  google_mobile_ads: ^5.3.0

  # Mağaza gizlilik / şartlar bağlantıları
  url_launcher: ^6.3.1

  # Connectivity
  connectivity_plus: ^6.0.3

  google_fonts: ^6.2.1

  # Grafikler (Ebeveyn Paneli)
  fl_chart: ^0.69.0

  # Animasyonlar (Ebeveyn Paneli)
  lottie: ^3.1.2
  shimmer: ^3.0.0

  # Ebeveyn Paneli Güvenlik
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # PDF Rapor (Ebeveyn Paneli)
  pdf: ^3.11.1
  printing: ^5.13.4
  path_provider: ^2.1.4
  share_plus: ^10.1.4

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  image_picker: ^1.2.2
  firebase_storage: ^13.3.0
  file_selector: ^1.1.0
  crop_your_image: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # App Icon
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/sounds/
    - assets/avatar/face/Face/Completes/
    - assets/avatar/hair/Hair/Black/
    - assets/avatar/hair/Hair/Blonde/
    - assets/avatar/hair/Hair/Brown 1/
    - assets/avatar/hair/Hair/Brown 2/
    - assets/avatar/hair/Hair/Grey/
    - assets/avatar/hair/Hair/Red/
    - assets/avatar/hair/Hair/Tan/
    - assets/avatar/hair/Hair/White/
    - assets/avatar/shirt/Shirts/Blue/
    - assets/avatar/shirt/Shirts/Green/
    - assets/avatar/shirt/Shirts/Grey/
    - assets/avatar/shirt/Shirts/Navy/
    - assets/avatar/shirt/Shirts/Pine/
    - assets/avatar/shirt/Shirts/Red/
    - assets/avatar/shirt/Shirts/White/
    - assets/avatar/shirt/Shirts/Yellow/
    - assets/avatar/pants/Pants/Blue 1/
    - assets/avatar/pants/Pants/Blue 2/
    - assets/avatar/pants/Pants/Brown/
    - assets/avatar/pants/Pants/Green/
    - assets/avatar/pants/Pants/Grey/
    - assets/avatar/pants/Pants/Light Blue/
    - assets/avatar/pants/Pants/Navy/
    - assets/avatar/pants/Pants/Pine/
    - assets/avatar/pants/Pants/Red/
    - assets/avatar/pants/Pants/Tan/
    - assets/avatar/pants/Pants/White/
    - assets/avatar/pants/Pants/Yellow/
    - assets/avatar/shoes/Shoes/Black/
    - assets/avatar/shoes/Shoes/Blue/
    - assets/avatar/shoes/Shoes/Brown 1/
    - assets/avatar/shoes/Shoes/Brown 2/
    - assets/avatar/shoes/Shoes/Grey/
    - assets/avatar/shoes/Shoes/Red/
    - assets/avatar/shoes/Shoes/Tan/
    - assets/avatar/skin/Skin/Tint 1/
    - assets/avatar/skin/Skin/Tint 2/
    - assets/avatar/skin/Skin/Tint 3/
    - assets/avatar/skin/Skin/Tint 4/
    - assets/avatar/skin/Skin/Tint 5/
    - assets/avatar/skin/Skin/Tint 6/
